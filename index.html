<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Backrooms - WebGL Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background: #000;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        
        #startScreen.hidden {
            display: none;
        }
        
        .start-title {
            font-size: 64px;
            color: #0f0;
            text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
            margin-bottom: 40px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 3px;
            animation: flicker 0.15s infinite;
        }
        
        .start-subtitle {
            font-size: 18px;
            color: #0a0;
            margin-bottom: 60px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .start-button {
            padding: 15px 40px;
            font-size: 20px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .start-button:hover {
            background: #0f0;
            box-shadow: 0 0 20px #0f0;
            transform: scale(1.05);
        }
        
        .start-button:active {
            transform: scale(0.95);
        }
        
        .start-info {
            position: absolute;
            bottom: 40px;
            font-size: 12px;
            color: #0a0;
            text-align: center;
            width: 100%;
        }
        
        .start-info p {
            margin: 5px 0;
        }
        
        @keyframes flicker {
            0% { text-shadow: 0 0 20px #0f0, 0 0 40px #0f0; }
            50% { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
            100% { text-shadow: 0 0 20px #0f0, 0 0 40px #0f0; }
        }
        
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-shadow: 0 0 10px #0f0;
            z-index: 100;
            line-height: 1.6;
        }
        
        #hud.hidden {
            display: none;
        }
        
        .hud-line {
            margin: 3px 0;
        }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #0f0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            box-shadow: inset 0 0 10px #0f0;
        }
        
        #crosshair::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 10px;
            background: #0f0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #crosshair::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 2px;
            background: #0f0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #crosshair.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="startScreen">
        <div class="start-title">LIMINAL BACKROOMS</div>
        <div class="start-subtitle">You wake up in an endless parking lot...</div>
        <button class="start-button" id="startButton">ENTER</button>
        <div class="start-info">
            <p>WASD - Move | Mouse - Look | Shift - Sprint</p>
            <p>Click to lock/unlock cursor | ESC to unlock</p>
        </div>
    </div>
    
    <div id="hud">
        <div class="hud-line">POS: <span id="posX">0</span>, <span id="posY">0</span>, <span id="posZ">0</span></div>
        <div class="hud-line">FPS: <span id="fps">60</span></div>
        <div class="hud-line">CHUNKS: <span id="chunks">0</span></div>
        <div class="hud-line">ENTITIES: <span id="entities">0</span></div>
    </div>
    
    <div id="crosshair"></div>
    
    <script src="game.js"></script>
</body>
</html>
